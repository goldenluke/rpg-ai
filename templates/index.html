<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG AI Multiplayer</title>
<script src="https://cdn.tailwindcss.com"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-black text-slate-200 min-h-screen">

<div class="max-w-7xl mx-auto p-6">

    <!-- HEADER -->
    <div class="text-center mb-10">
        <h1 class="text-5xl font-bold text-cyan-400 tracking-wide">
            RPG AI Multiplayer
        </h1>
        <p class="text-slate-400 mt-2">D&D + QWAN + WebSocket</p>
    </div>

    <!-- CONFIGURAÇÃO -->
    <div class="bg-slate-900/70 backdrop-blur p-6 rounded-2xl shadow-2xl mb-8">
        <h2 class="text-xl text-cyan-300 mb-4">Configuração</h2>

        <div class="grid md:grid-cols-4 gap-4">

            <input id="nome" placeholder="Nome"
                class="bg-slate-800 p-3 rounded-lg w-full">

            <select id="classe"
                class="bg-slate-800 p-3 rounded-lg w-full">
                <option value="guerreiro">Guerreiro</option>
                <option value="mago">Mago</option>
                <option value="ladino">Ladino</option>
            </select>

            <input id="roomId" placeholder="Sala (ex: dungeon1)"
                class="bg-slate-800 p-3 rounded-lg w-full">

            <button onclick="criarSessao()"
                class="bg-cyan-600 hover:bg-cyan-500 transition px-6 py-3 rounded-lg font-semibold">
                Iniciar
            </button>

        </div>
    </div>

    <!-- STATUS -->
    <div class="grid md:grid-cols-3 gap-6 mb-8">

        <!-- PLAYER -->
        <div class="bg-slate-900 p-6 rounded-xl shadow-lg">
            <h3 class="text-cyan-300 text-lg mb-4">Personagem</h3>
            <p>HP: <span id="hp">-</span></p>
            <p>Mana: <span id="mana">-</span></p>
            <p>XP: <span id="xp">-</span></p>
            <p class="text-xs text-slate-400 mt-3">
                Sessão: <span id="sessionId">-</span>
            </p>
        </div>

        <!-- INIMIGO -->
        <div class="bg-slate-900 p-6 rounded-xl shadow-lg">
            <h3 class="text-red-400 text-lg mb-4">Inimigo</h3>
            <p>HP: <span id="hpInimigo">-</span></p>
        </div>

        <!-- SALA -->
        <div class="bg-slate-900 p-6 rounded-xl shadow-lg">
            <h3 class="text-purple-400 text-lg mb-4">Sala</h3>
            <p>ID: <span id="currentRoom">-</span></p>
        </div>

    </div>

    <!-- LOG + CHAT -->
    <div class="grid md:grid-cols-2 gap-6 mb-8">

        <!-- NARRATIVA -->
        <div class="bg-slate-900 p-6 rounded-xl shadow-xl">
            <h3 class="text-cyan-300 text-lg mb-4">Narrativa</h3>

            <div id="narrativa"
                 class="bg-slate-800 p-4 rounded-lg h-72 overflow-y-auto text-sm whitespace-pre-wrap">
                Aguardando início...
            </div>

            <div class="flex gap-3 mt-4">
                <input id="inputNarrativa"
                    placeholder="Descreva sua ação..."
                    class="bg-slate-800 p-3 rounded-lg w-full">

                <button onclick="enviarNarrativa()"
                    class="bg-emerald-600 hover:bg-emerald-500 transition px-5 rounded-lg">
                    Enviar
                </button>
            </div>
        </div>

        <!-- CHAT MULTIPLAYER -->
        <div class="bg-slate-900 p-6 rounded-xl shadow-xl">
            <h3 class="text-purple-300 text-lg mb-4">Chat da Sala</h3>

            <div id="chat"
                 class="bg-slate-800 p-4 rounded-lg h-72 overflow-y-auto text-sm whitespace-pre-wrap">
            </div>

            <div class="flex gap-3 mt-4">
                <input id="chatInput"
                    placeholder="Mensagem..."
                    class="bg-slate-800 p-3 rounded-lg w-full">

                <button onclick="enviarChat()"
                    class="bg-purple-600 hover:bg-purple-500 transition px-5 rounded-lg">
                    Enviar
                </button>
            </div>
        </div>

    </div>

    <!-- AÇÕES -->
    <div class="bg-slate-900 p-6 rounded-xl shadow-lg">
        <h3 class="text-cyan-300 text-lg mb-4">Ações</h3>

        <div class="flex flex-wrap gap-4">
            <button onclick="executarCombate('Atacar')"
                class="bg-red-600 hover:bg-red-500 transition px-6 py-3 rounded-lg">
                ⚔️ Atacar
            </button>

            <button onclick="executarCombate('Magia')"
                class="bg-purple-600 hover:bg-purple-500 transition px-6 py-3 rounded-lg">
                ✨ Magia
            </button>

            <button onclick="executarCombate('Defender')"
                class="bg-yellow-600 hover:bg-yellow-500 transition px-6 py-3 rounded-lg">
                🛡️ Defender
            </button>
        </div>
    </div>

</div>

<script>

let sessionId = null;
let socket = null;
let roomId = null;

function adicionarTexto(divId, texto) {
    const div = document.getElementById(divId);
    div.innerText += "\n" + texto;
    div.scrollTop = div.scrollHeight;
}

async function criarSessao() {

    const nome = document.getElementById("nome").value || "Aventureiro";
    const classe = document.getElementById("classe").value;
    roomId = document.getElementById("roomId").value || "sala1";

    document.getElementById("currentRoom").innerText = roomId;

    const response = await fetch("/api/rpg/criar-sessao", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ nome: nome, classe: classe })
    });

    const data = await response.json();

    sessionId = data.session_id;
    document.getElementById("sessionId").innerText = sessionId;
    document.getElementById("hp").innerText = data.personagem.hp;
    document.getElementById("mana").innerText = data.personagem.mana;
    document.getElementById("xp").innerText = data.personagem.xp;

    conectarWebSocket();
}

function conectarWebSocket() {

    socket = new WebSocket(
        "ws://" + window.location.host + "/ws/rpg/" + roomId + "/"
    );

    socket.onmessage = function(event) {
        const data = JSON.parse(event.data);

        if (data.tipo === "chat")
            adicionarTexto("chat", data.nome + ": " + data.texto);

        if (data.tipo === "narrativa")
            adicionarTexto("narrativa", data.texto);
    };
}

function enviarChat() {

    const texto = document.getElementById("chatInput").value;
    if (!texto) return;

    socket.send(JSON.stringify({
        tipo: "chat",
        nome: document.getElementById("nome").value,
        texto: texto
    }));

    document.getElementById("chatInput").value = "";
}

async function enviarNarrativa() {

    const texto = document.getElementById("inputNarrativa").value;
    if (!texto) return;

    const response = await fetch("/api/rpg/analisar-cena", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ textos: [texto] })
    });

    const data = await response.json();

    adicionarTexto("narrativa", data.narrativa);

    socket.send(JSON.stringify({
        tipo: "narrativa",
        texto: data.narrativa
    }));
}

async function executarCombate(acao) {

    const response = await fetch("/api/rpg/combate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            session_id: sessionId,
            acao: acao
        })
    });

    const data = await response.json();

    adicionarTexto("narrativa", data.narrativa);

    document.getElementById("hp").innerText = data.hp;
    document.getElementById("mana").innerText = data.mana;
    document.getElementById("xp").innerText = data.xp;
    document.getElementById("hpInimigo").innerText = data.hp_inimigo;

    socket.send(JSON.stringify({
        tipo: "narrativa",
        texto: data.narrativa
    }));
}

</script>

</body>
</html>
