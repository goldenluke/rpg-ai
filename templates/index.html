<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Procedural RPG</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-black text-slate-200 min-h-screen">


<div class="max-w-7xl mx-auto p-6 space-y-6">


<!-- HEADER -->

<header class="text-center space-y-2">

<h1 class="text-5xl font-bold text-cyan-400">
Procedural RPG
</h1>

<p class="text-slate-400">
Narrativa procedural persistente
</p>

</header>



<!-- STATUS BAR -->

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">

<div class="bg-slate-900 rounded-xl p-4 shadow">

<div class="text-sm text-slate-400">HP</div>

<div id="hp" class="text-2xl text-red-400 font-bold">
100
</div>

</div>

<div class="bg-slate-900 rounded-xl p-4 shadow">

<div class="text-sm text-slate-400">Mana</div>

<div id="mana" class="text-2xl text-blue-400 font-bold">
60
</div>

</div>

<div class="bg-slate-900 rounded-xl p-4 shadow">

<div class="text-sm text-slate-400">XP</div>

<div id="xp" class="text-2xl text-yellow-400 font-bold">
0
</div>

</div>

<div class="bg-slate-900 rounded-xl p-4 shadow">

<div class="text-sm text-slate-400">Ouro</div>

<div id="gold" class="text-2xl text-yellow-300 font-bold">
100
</div>

</div>

</div>



<!-- MAIN GRID -->

<div class="grid lg:grid-cols-3 gap-6">


<!-- NARRATIVA -->

<div class="lg:col-span-2 bg-slate-900 rounded-xl p-6 flex flex-col">

<h2 class="text-cyan-300 text-lg mb-4">
📖 Narrativa
</h2>


<div id="narrativa"

class="bg-slate-800 rounded-lg p-4 h-[520px] overflow-y-auto space-y-4 text-sm">

Carregando narrativa...

</div>


<div class="flex gap-3 mt-4">

<input
id="inputNarrativa"
placeholder="Descreva sua ação..."
class="bg-slate-800 rounded-lg p-3 w-full outline-none focus:ring-2 focus:ring-cyan-500"
/>

<button
onclick="enviarNarrativa()"
class="bg-emerald-600 hover:bg-emerald-500 px-6 rounded-lg"
>
Enviar
</button>

</div>

</div>



<!-- SIDEBAR -->

<div class="space-y-6">


<!-- INVENTARIO -->

<div class="bg-slate-900 rounded-xl p-4">

<h3 class="text-green-300 mb-3">
🎒 Inventário
</h3>

<ul id="inventario" class="space-y-1 text-sm">

<li>Espada</li>
<li>Poção</li>

</ul>

</div>



<!-- COMBATE -->

<div class="bg-slate-900 rounded-xl p-4">

<h3 class="text-red-400 mb-3">
⚔️ Combate
</h3>

<div class="grid gap-2">

<button
onclick="executarCombate('Atacar')"
class="bg-red-600 hover:bg-red-500 py-2 rounded">
Atacar
</button>

<button
onclick="executarCombate('Magia')"
class="bg-purple-600 hover:bg-purple-500 py-2 rounded">
Magia
</button>

<button
onclick="executarCombate('Defender')"
class="bg-yellow-600 hover:bg-yellow-500 py-2 rounded">
Defender
</button>

</div>

</div>



<!-- MUNDO -->

<div class="bg-slate-900 rounded-xl p-4">

<h3 class="text-indigo-300 mb-3">
🌍 Mundo
</h3>

<div class="grid gap-2">

<button
onclick="spawnMonster()"
class="bg-red-700 hover:bg-red-600 py-2 rounded">
Encontrar Monstro
</button>

<button
onclick="gerarDungeon()"
class="bg-indigo-600 hover:bg-indigo-500 py-2 rounded">
Explorar Dungeon
</button>

<button
onclick="criarFacao()"
class="bg-purple-600 hover:bg-purple-500 py-2 rounded">
Nova Facção
</button>

</div>

</div>

</div>

</div>



<!-- ESTADO DO MUNDO -->

<div class="bg-slate-900 rounded-xl p-6">

<h2 class="text-cyan-300 text-lg mb-4">
🌍 Estado do Mundo
</h2>


<div class="grid grid-cols-2 md:grid-cols-5 gap-4 text-center">

<div class="bg-slate-800 rounded-lg p-3">

<div class="text-xs text-slate-400">Cidades</div>

<div id="citiesCount" class="text-lg font-bold">0</div>

</div>


<div class="bg-slate-800 rounded-lg p-3">

<div class="text-xs text-slate-400">NPCs</div>

<div id="npcCount" class="text-lg font-bold">0</div>

</div>


<div class="bg-slate-800 rounded-lg p-3">

<div class="text-xs text-slate-400">Facções</div>

<div id="factionCount" class="text-lg font-bold">0</div>

</div>


<div class="bg-slate-800 rounded-lg p-3">

<div class="text-xs text-slate-400">Quests</div>

<div id="questCount" class="text-lg font-bold">0</div>

</div>


<div class="bg-slate-800 rounded-lg p-3">

<div class="text-xs text-slate-400">Eventos</div>

<div id="eventCount" class="text-lg font-bold">0</div>

</div>

</div>

</div>


</div>



<script>


let historyNarrativa = []


function renderNarrativa(){

const div = document.getElementById("narrativa")

div.innerHTML=""

historyNarrativa.forEach(item=>{

const bloco=document.createElement("div")

if(item.tipo==="prompt"){

bloco.innerHTML=`
<div class="text-emerald-400 font-semibold">Você</div>
<div class="text-slate-200">${item.texto}</div>
`

}

if(item.tipo==="resposta"){

bloco.innerHTML=`
<div class="text-cyan-400 font-semibold">Narrador</div>
<div class="text-slate-300">${item.texto}</div>
`

}

div.appendChild(bloco)

})

div.scrollTop = div.scrollHeight

}



async function carregarHistorico(){

const r = await fetch("/api/world/history")

const data = await r.json()

historyNarrativa=[]

data.history.forEach(item=>{

historyNarrativa.push({
tipo:"prompt",
texto:item.prompt
})

historyNarrativa.push({
tipo:"resposta",
texto:item.resposta
})

})

renderNarrativa()

}



async function enviarNarrativa(){

const texto=document.getElementById("inputNarrativa").value

if(!texto) return

historyNarrativa.push({
tipo:"prompt",
texto:texto
})

renderNarrativa()

const r = await fetch("/api/rpg/analisar-cena",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

textos:[texto]

})

})

const data = await r.json()

historyNarrativa.push({
tipo:"resposta",
texto:data.narrativa
})

renderNarrativa()

document.getElementById("inputNarrativa").value=""

}



async function executarCombate(acao){

const r = await fetch("/api/rpg/combate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

session_id:"player",
acao:acao

})

})

const data = await r.json()

historyNarrativa.push({
tipo:"resposta",
texto:data.narrativa
})

renderNarrativa()

}



async function spawnMonster(){

const r = await fetch("/api/world/monster")

const data = await r.json()

historyNarrativa.push({

tipo:"resposta",
texto:"🐉 Um "+data.monster.tipo+" apareceu!"

})

renderNarrativa()

}



async function gerarDungeon(){

const r = await fetch("/api/world/dungeon")

const data = await r.json()

historyNarrativa.push({

tipo:"resposta",
texto:"🏰 Dungeon encontrada com "+data.dungeon.salas.length+" salas."

})

renderNarrativa()

}



async function criarFacao(){

const r = await fetch("/api/world/faction")

const data = await r.json()

historyNarrativa.push({

tipo:"resposta",
texto:"🏳️ Nova facção surgiu: "+data.faction.nome

})

renderNarrativa()

}



async function carregarEstadoMundo(){

const r = await fetch("/api/world/state")

const data = await r.json()

const world=data.world

document.getElementById("citiesCount").innerText = Object.keys(world.cities).length
document.getElementById("npcCount").innerText = Object.keys(world.npcs).length
document.getElementById("factionCount").innerText = Object.keys(world.factions).length
document.getElementById("questCount").innerText = Object.keys(world.quests).length
document.getElementById("eventCount").innerText = world.history.length

}



setInterval(carregarEstadoMundo,5000)

carregarHistorico()

carregarEstadoMundo()


</script>


</body>
</html>
